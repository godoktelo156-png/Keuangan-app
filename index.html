<!DOCTYPE html>
<html lang="id">
<head><link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<title>Catatan Keuangan v4</title>
<style>
body { font-family: Arial; padding: 15px; background: #f5f5f5; }
.card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; }
button { padding: 8px; margin-top:5px; width: 100%; border-radius: 8px; background: black; color: white; }
input, select { width: 100%; padding: 10px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #ccc; }
.income { color: green; }
.expense { color: red; }
.saving { color: blue; }
.small-btn { width:auto; margin-right:5px; padding:5px 8px;}
</style>
</head><script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>
<body>

<h2>Catatan Keuangan</h2>

<div class="card">
<p>Saldo: <b id="balance">0</b></p>
<p class="income">Pemasukan: <span id="income">0</span></p>
<p class="expense">Pengeluaran: <span id="expense">0</span></p>
<p class="saving">Tabungan: <span id="saving">0</span></p>
</div>

<div class="card">
<input type="date" id="date">
<select id="type">
<option value="income">Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>
<input type="number" id="amount" placeholder="Jumlah">
<input type="text" id="desc" placeholder="Keterangan">
<label><input type="checkbox" id="isSaving"> Tabungan</label>
<button onclick="saveData()">Simpan</button>
</div>

<div id="list"></div>

<script>
let data = JSON.parse(localStorage.getItem("keuangan")) || [];
let editIndex = null;

function saveLocal(){
  localStorage.setItem("keuangan", JSON.stringify(data));
}

function formatDate(d){
  const date = new Date(d);
  return date.toLocaleDateString("id-ID",{day:'numeric',month:'long',year:'numeric'});
}

function render(){
  let income=0, expense=0, saving=0;
  let grouped={};
  const list=document.getElementById("list");
  list.innerHTML="";

  data.forEach((t,i)=>{
    if(!grouped[t.date]) grouped[t.date]=[];
    grouped[t.date].push({...t,index:i});

    if(t.saving) saving+=t.amount;
    else if(t.type==="income") income+=t.amount;
    else expense+=t.amount;
  });

  Object.keys(grouped).sort((a,b)=>new Date(b)-new Date(a)).forEach(date=>{
    let dailyTotal=0;

    let html=`<div class="card"><b>📅 ${formatDate(date)}</b><br>`;

    grouped[date].forEach(t=>{
      let label=t.saving?"Tabungan":(t.type==="income"?"Pemasukan":"Pengeluaran");
      let color=t.saving?"saving":(t.type==="income"?"income":"expense");

      if(t.saving) dailyTotal -= t.amount;
      else if(t.type==="income") dailyTotal += t.amount;
      else dailyTotal -= t.amount;

      html+=`
      <div>
        <b>${t.desc||"-"}</b><br>
        <small>${label}</small>
        <p class="${color}">Rp ${t.amount}</p>
        <button class="small-btn" onclick="edit(${t.index})">Edit</button>
        <button class="small-btn" onclick="hapus(${t.index})">Hapus</button>
      </div><hr>`;
    });

    html+=`<b>Total hari ini: Rp ${dailyTotal}</b></div>`;
    list.innerHTML+=html;
  });

  document.getElementById("income").innerText=income;
  document.getElementById("expense").innerText=expense;
  document.getElementById("saving").innerText=saving;
  document.getElementById("balance").innerText=income-expense-saving;
}

function saveData(){
  const amount=document.getElementById("amount").value;
  const desc=document.getElementById("desc").value;
  const type=document.getElementById("type").value;
  const saving=document.getElementById("isSaving").checked;
  const date=document.getElementById("date").value;

  if(!amount || !date) return alert("Isi jumlah & tanggal!");

  const newData={amount:+amount,desc,type,saving,date};

  if(editIndex!==null){
    data[editIndex]=newData;
    editIndex=null;
  } else {
    data.unshift(newData);
  }

  saveLocal();
  render();

  document.getElementById("amount").value="";
  document.getElementById("desc").value="";
  document.getElementById("date").value="";
  document.getElementById("isSaving").checked=false;
}

function edit(i){
  const t=data[i];
  document.getElementById("amount").value=t.amount;
  document.getElementById("desc").value=t.desc;
  document.getElementById("type").value=t.type;
  document.getElementById("isSaving").checked=t.saving;
  document.getElementById("date").value=t.date;
  editIndex=i;
}

function hapus(i){
  data.splice(i,1);
  saveLocal();
  render();
}

render();
</script>

</body>
</html>
